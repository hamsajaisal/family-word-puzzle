<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Word Puzzle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        :root {
            --primary: #4A90E2;
            --primary-glow: rgba(74, 144, 226, 0.4);
            --secondary: #F39C12;
            --secondary-gradient: linear-gradient(135deg, #F39C12 0%, #D35400 100%);
            --primary-gradient: linear-gradient(135deg, #4A90E2 0%, #2980B9 100%);
            --bg: radial-gradient(circle at top, #1a1f35 0%, #0a0d1a 100%);
            --text: #ffffff;
            --text-secondary: #a0aec0;
            --grid-bg: #151a30;
            --selected: #2ECC71;
            --selected-gradient: linear-gradient(135deg, #2ECC71 0%, #27AE60 100%);
            --error: #E74C3C;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, #a0aec0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Setup Screen & End Screen */
        #setup-screen, #end-screen {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            font-weight: 600;
            background-color: rgba(0, 0, 0, 0.2);
            color: #fff;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            cursor: pointer;
            font-family: inherit;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        button {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        #start-btn, #restart-btn {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }

        #start-btn:hover, #restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
        }

        #start-btn:active, #restart-btn:active {
            transform: translateY(1px);
        }

        button:focus {
            outline: 3px solid var(--secondary);
            outline-offset: 2px;
        }

        /* Game Screen */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 600px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 16px 24px;
            border-radius: 14px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            font-size: 18px;
            font-weight: 600;
        }

        .player-turn {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(74, 144, 226, 0.3);
            animation: pulseTurn 2.5s infinite ease-in-out;
        }

        @keyframes pulseTurn {
            0%, 100% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); color: var(--primary); }
        }

        /* Grid */
        #grid-container {
            display: grid;
            gap: 12px;
            margin: 25px auto;
            justify-content: center;
            padding: 16px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            max-width: fit-content;
        }

        .letter-btn {
            width: 72px;
            height: 72px;
            font-size: 30px;
            font-weight: 800;
            background-color: var(--grid-bg);
            color: var(--text);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0d1222;
            text-transform: uppercase;
            transition: all 0.15s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translateY(0px);
        }

        .letter-btn:hover {
            background-color: #1c233f;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #0d1222;
        }

        .letter-btn[aria-pressed="true"] {
            background: var(--selected-gradient);
            color: white;
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 2px 0 #1b7a43, 0 0 15px rgba(46, 204, 113, 0.4);
            transform: translateY(4px);
        }

        .letter-btn[aria-pressed="true"]:hover {
            background: var(--selected-gradient);
            box-shadow: 0 2px 0 #1b7a43, 0 0 15px rgba(46, 204, 113, 0.4);
            transform: translateY(4px);
        }

        .letter-btn:focus {
            outline: 4px solid var(--secondary);
            outline-offset: 4px;
        }

        /* Controls */
        #current-word-display {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 6px;
            margin: 25px 0;
            min-height: 45px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 25px;
        }

        #submit-btn {
            background: var(--secondary-gradient);
            color: white;
            width: auto;
            padding: 14px 40px;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
        }

        #submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.4);
        }

        #submit-btn:active {
            transform: translateY(1px);
        }

        /* End Match Definition */
        .word-def-box {
            margin-top: 24px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            border-left: 4px solid var(--primary);
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            text-align: left;
            font-size: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .word-def-title {
            color: var(--primary);
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .word-def-text {
            color: var(--text-secondary);
            font-style: italic;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="announcer" class="sr-only" aria-live="assertive"></div>
    <div id="word-announcer" class="sr-only" aria-live="polite"></div>

    <div id="setup-screen">
        <h1>Word Puzzle</h1>
        <div class="form-group">
            <label for="mode">Game Mode</label>
            <select id="mode">
                <option value="1">Single Player</option>
                <option value="2">Two Players</option>
            </select>
        </div>
        <div class="form-group">
            <label for="grid-size">Grid Size</label>
            <select id="grid-size">
                <option value="3x3">3 × 3</option>
                <option value="4x4">4 × 4</option>
                <option value="5x4">5 × 4</option>
                <option value="5x5">5 × 5</option>
            </select>
        </div>
        <div class="form-group">
            <label for="time-limit">Time Limit</label>
            <select id="time-limit">
                <option value="60">1 Minute</option>
                <option value="120">2 Minutes</option>
                <option value="300">5 Minutes</option>
            </select>
        </div>
        <button id="start-btn">Start Game</button>
    </div>

    <div id="game-screen">
        <div id="turn-indicator" class="player-turn" aria-live="polite"></div>
        <div class="status-bar">
            <div id="score-display" aria-live="polite">Score: 0</div>
            <div id="timer-display" aria-live="polite">Time: 1:00</div>
        </div>

        <div id="current-word-display" aria-hidden="true"></div>
        
        <div id="grid-container" role="group" aria-label="Letter Grid"></div>

        <div id="controls">
            <button id="submit-btn" aria-label="Click to submit word, or press Enter">Done (Click)</button>
        </div>
    </div>

    <div id="end-screen" style="display: none;">
        <h1>Game Over!</h1>
        <div id="results" aria-live="polite"></div>
        <button id="restart-btn" style="margin-top: 20px;">Play Again</button>
    </div>
