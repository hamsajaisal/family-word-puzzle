<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Word Puzzle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        :root {
            --primary: #4A90E2;
            --primary-glow: rgba(74, 144, 226, 0.4);
            --secondary: #F39C12;
            --secondary-gradient: linear-gradient(135deg, #F39C12 0%, #D35400 100%);
            --primary-gradient: linear-gradient(135deg, #4A90E2 0%, #2980B9 100%);
            --bg: radial-gradient(circle at top, #1a1f35 0%, #0a0d1a 100%);
            --text: #ffffff;
            --text-secondary: #a0aec0;
            --grid-bg: #151a30;
            --selected: #2ECC71;
            --selected-gradient: linear-gradient(135deg, #2ECC71 0%, #27AE60 100%);
            --error: #E74C3C;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, #a0aec0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Setup Screen & End Screen */
        #setup-screen, #end-screen {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            font-weight: 600;
            background-color: rgba(0, 0, 0, 0.2);
            color: #fff;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            cursor: pointer;
            font-family: inherit;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        button {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        #start-btn, #restart-btn {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }

        #start-btn:hover, #restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
        }

        #start-btn:active, #restart-btn:active {
            transform: translateY(1px);
        }

        button:focus {
            outline: 3px solid var(--secondary);
            outline-offset: 2px;
        }

        /* Game Screen */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 600px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 16px 24px;
            border-radius: 14px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            font-size: 18px;
            font-weight: 600;
        }

        .player-turn {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(74, 144, 226, 0.3);
            animation: pulseTurn 2.5s infinite ease-in-out;
        }

        @keyframes pulseTurn {
            0%, 100% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); color: var(--primary); }
        }

        /* Grid */
        #grid-container {
            display: grid;
            gap: 12px;
            margin: 25px auto;
            justify-content: center;
            padding: 16px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            max-width: fit-content;
        }

        .letter-btn {
            width: 72px;
            height: 72px;
            font-size: 30px;
            font-weight: 800;
            background-color: var(--grid-bg);
            color: var(--text);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0d1222;
            text-transform: uppercase;
            transition: all 0.15s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translateY(0px);
        }

        .letter-btn:hover {
            background-color: #1c233f;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #0d1222;
        }

        .letter-btn[aria-pressed="true"] {
            background: var(--selected-gradient);
            color: white;
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 2px 0 #1b7a43, 0 0 15px rgba(46, 204, 113, 0.4);
            transform: translateY(4px);
        }

        .letter-btn[aria-pressed="true"]:hover {
            background: var(--selected-gradient);
            box-shadow: 0 2px 0 #1b7a43, 0 0 15px rgba(46, 204, 113, 0.4);
            transform: translateY(4px);
        }

        .letter-btn:focus {
            outline: 4px solid var(--secondary);
            outline-offset: 4px;
        }

        /* Controls */
        #current-word-display {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 6px;
            margin: 25px 0;
            min-height: 45px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 25px;
        }

        #submit-btn {
            background: var(--secondary-gradient);
            color: white;
            width: auto;
            padding: 14px 40px;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
        }

        #submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.4);
        }

        #submit-btn:active {
            transform: translateY(1px);
        }

        /* End Match Definition */
        .word-def-box {
            margin-top: 24px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            border-left: 4px solid var(--primary);
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            text-align: left;
            font-size: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .word-def-title {
            color: var(--primary);
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .word-def-text {
            color: var(--text-secondary);
            font-style: italic;
            line-height: 1.4;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }

        .score-popup {
            position: absolute;
            color: #2ECC71;
            font-weight: 800;
            font-size: 24px;
            pointer-events: none;
            animation: floatUpFade 1.2s forwards cubic-bezier(0.19, 1, 0.22, 1);
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
            z-index: 1000;
            font-family: 'Outfit', sans-serif;
        }

        @keyframes floatUpFade {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            15% { opacity: 1; transform: translateY(-20px) scale(1.1); }
            100% { transform: translateY(-80px) scale(0.9); opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>

    <div id="announcer" class="sr-only" aria-live="assertive"></div>
    <div id="word-announcer" class="sr-only" aria-live="polite"></div>

    <div id="setup-screen">
        <h1>Word Puzzle</h1>
        <div class="form-group">
            <label for="mode">Game Mode</label>
            <select id="mode">
                <option value="1">Single Player</option>
                <option value="2">Two Players</option>
            </select>
        </div>
        <div class="form-group">
            <label for="difficulty">Difficulty</label>
            <select id="difficulty">
                <option value="easy">Easy (Simple Words)</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard (All Words)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="grid-size">Grid Size</label>
            <select id="grid-size">
                <option value="3x3">3 × 3</option>
                <option value="4x4">4 × 4</option>
                <option value="5x4">5 × 4</option>
                <option value="5x5">5 × 5</option>
            </select>
        </div>
        <div class="form-group">
            <label for="time-limit">Time Limit</label>
            <select id="time-limit">
                <option value="60">1 Minute</option>
                <option value="120">2 Minutes</option>
                <option value="300">5 Minutes</option>
            </select>
        </div>
        <button id="start-btn">Start Game</button>
    </div>

    <div id="game-screen">
        <div id="turn-indicator" class="player-turn" aria-live="polite"></div>
        <div class="status-bar">
            <div id="score-display" aria-live="polite">Score: 0</div>
            <div id="timer-display" aria-live="polite">Time: 1:00</div>
        </div>

        <div id="current-word-display" aria-hidden="true"></div>
        
        <div id="grid-container" role="group" aria-label="Letter Grid"></div>

        <div id="controls">
            <button id="submit-btn" aria-label="Click to submit word, or press Enter">Done (Click)</button>
        </div>
    </div>

    <div id="end-screen" style="display: none;">
        <h1>Game Over!</h1>
        <div id="results" aria-live="polite"></div>
        <button id="restart-btn" style="margin-top: 20px;">Play Again</button>
    </div>

    // --- Web Audio Synthesizer for Accessibility Cues (Earcons) ---
    let audioCtx = null;

    function initAudio() {
        try {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (AudioContextClass) {
                if (!audioCtx) {
                    audioCtx = new AudioContextClass();
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }
        } catch (e) {
            console.error("Web Audio API not supported or blocked:", e);
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const now = audioCtx.currentTime;
        
        if (type === 'success') {
            // Ding (pleasant rising major chime scaling by word length)
            let notes = [523.25, 659.25, 783.99]; // C5, E5, G5
            const wordLen = arguments[1] || 3;
            
            if (wordLen === 4) {
                notes = [659.25, 783.99, 987.77, 1046.50]; // E5, G5, B5, C6
            } else if (wordLen === 5) {
                notes = [523.25, 659.25, 783.99, 1046.50, 1318.51]; // C5, E5, G5, C6, E6
            } else if (wordLen >= 6) {
                notes = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50]; // C5, D5, E5, G5, A5, C6
            }

            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + index * 0.07);
                
                gainNode.gain.setValueAtTime(0.12, now + index * 0.07);
                gainNode.gain.exponentialRampToValueAtTime(0.005, now + index * 0.07 + 0.14);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start(now + index * 0.07);
                osc.stop(now + index * 0.07 + 0.16);
            });
        } else if (type === 'error') {
            // Bonk (low frequency sliding down triangle wave)
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(60, now + 0.2);
            
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.linearRampToValueAtTime(0.01, now + 0.2);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start(now);
            osc.stop(now + 0.2);
        } else if (type === 'tick') {
            // Short woodblock tick
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1000, now);
            
            gainNode.gain.setValueAtTime(0.08, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start(now);
            osc.stop(now + 0.03);
        }
    }

    // --- Free Dictionary API Helper ---
    async function fetchDefinition(word) {
        if (!word) return null;
        try {
            const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
            if (!response.ok) return null;
            const data = await response.json();
            const definition = data[0]?.meanings[0]?.definitions[0]?.definition;
            const partOfSpeech = data[0]?.meanings[0]?.partOfSpeech;
            if (definition) {
                return { definition, partOfSpeech };
            }
        } catch (e) {
            console.error("Error fetching definition:", e);
        }
        return null;
    }

    function solveGrid(grid, dictSet, minLen = 3, maxLen = 8) {
        const rows = grid.length;
        const cols = grid[0].length;
        const foundWords = new Set();
        const visited = Array.from({ length: rows }, () => Array(cols).fill(false));

        function dfs(r, c, currentStr) {
            if (currentStr.length >= minLen && currentStr.length <= maxLen) {
                if (dictSet.has(currentStr)) {
                    foundWords.add(currentStr);
                }
            }
            if (currentStr.length > maxLen) return;

            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const nr = r + dr;
                    const nc = c + dc;
                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !visited[nr][nc]) {
                        visited[nr][nc] = true;
                        dfs(nr, nc, currentStr + grid[nr][nc]);
                        visited[nr][nc] = false;
                    }
                }
            }
        }

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                visited[r][c] = true;
                dfs(r, c, grid[r][c]);
                visited[r][c] = false;
            }
        }

        return foundWords;
    }

    function generateGrid() {
        const activeDict = state.difficulty === 'easy' ? easyWords : (state.difficulty === 'medium' ? mediumWords : hardWords);

        let threshold = 5;
        if (state.rows === 3) {
            if (state.difficulty === 'easy') threshold = 6;
            else if (state.difficulty === 'medium') threshold = 4;
            else threshold = 3;
        } else if (state.rows === 4) {
            if (state.difficulty === 'easy') threshold = 15;
            else if (state.difficulty === 'medium') threshold = 10;
            else threshold = 6;
        } else { // 5x4 or 5x5
            if (state.difficulty === 'easy') threshold = 22;
            else if (state.difficulty === 'medium') threshold = 15;
            else threshold = 8;
        }

        let attempts = 0;
        let bestGrid = null;
        let bestWords = new Set();

        while (attempts < 100) {
            let tempGrid = [];
            for (let r = 0; r < state.rows; r++) {
                let rowLetters = [];
                for (let c = 0; c < state.cols; c++) {
                    let isVowel = Math.random() > 0.6;
                    let letterSet = isVowel ? vowels : consonants;
                    rowLetters.push(letterSet[Math.floor(Math.random() * letterSet.length)]);
                }
                tempGrid.push(rowLetters);
            }

            const found = solveGrid(tempGrid, activeDict);
            if (found.size >= threshold) {
                bestGrid = tempGrid;
                bestWords = found;
                break;
            }
            if (found.size > bestWords.size) {
                bestGrid = tempGrid;
                bestWords = found;
            }
            attempts++;
        }

        state.gridLetters = bestGrid;
        
        gridContainer.innerHTML = '';
        gridContainer.style.gridTemplateColumns = `repeat(${state.cols}, 1fr)`;

        for (let r = 0; r < state.rows; r++) {
            for (let c = 0; c < state.cols; c++) {
                let letter = state.gridLetters[r][c];
                let btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.textContent = letter;
                btn.setAttribute('aria-pressed', 'false');
                btn.setAttribute('aria-label', `${letter}, row ${r+1} column ${c+1}`);
                btn.dataset.row = r;
                btn.dataset.col = c;
                
                btn.addEventListener('click', () => toggleLetter(btn));
                btn.addEventListener('keydown', handleGridNavigation);
                
                gridContainer.appendChild(btn);
            }
        }
        console.log(`Generated grid in ${attempts} attempts containing ${bestWords.size} words.`);
    }

    function handleGridNavigation(e) {
        const row = parseInt(e.target.dataset.row);
        const col = parseInt(e.target.dataset.col);
        let newRow = row;
        let newCol = col;

        if (e.key === 'ArrowUp') newRow = Math.max(0, row - 1);
        else if (e.key === 'ArrowDown') newRow = Math.min(state.rows - 1, row + 1);
        else if (e.key === 'ArrowLeft') newCol = Math.max(0, col - 1);
        else if (e.key === 'ArrowRight') newCol = Math.min(state.cols - 1, col + 1);
        else if (e.key === 'Enter') {
            e.preventDefault();
            submitCurrentWord();
            return;
        } else {
            return; // Not a navigation key
        }

        e.preventDefault();
        const targetBtn = document.querySelector(`.letter-btn[data-row="${newRow}"][data-col="${newCol}"]`);
        if (targetBtn) targetBtn.focus();
    }

    function toggleLetter(btn) {
        const isPressed = btn.getAttribute('aria-pressed') === 'true';
        
        if (isPressed) {
            // Only allow deselecting the LAST selected letter
            if (state.selectedButtons[state.selectedButtons.length - 1] === btn) {
                btn.setAttribute('aria-pressed', 'false');
                state.selectedButtons.pop();
                state.currentWord = state.currentWord.slice(0, -1);
            } else {
                announce("You can only deselect the last chosen letter.");
                playSound('error');
                return;
            }
        } else {
            // Check adjacency (horizontal, vertical, diagonal)
            if (state.selectedButtons.length > 0) {
                let lastBtn = state.selectedButtons[state.selectedButtons.length - 1];
                let r1 = parseInt(lastBtn.dataset.row), c1 = parseInt(lastBtn.dataset.col);
                let r2 = parseInt(btn.dataset.row), c2 = parseInt(btn.dataset.col);
                
                if (Math.abs(r1 - r2) > 1 || Math.abs(c1 - c2) > 1) {
                    announce("Invalid move. Select an adjacent letter.");
                    playSound('error');
                    return;
                }
            }
            btn.setAttribute('aria-pressed', 'true');
            state.selectedButtons.push(btn);
            state.currentWord += btn.textContent;
        }
        
        document.getElementById('current-word-display').textContent = state.currentWord;
        wordAnnouncer.textContent = `Current word: ${state.currentWord}`;
    }

    function submitCurrentWord() {
        if (state.currentWord.length < 3) {
            announce("Word too short. Must be at least 3 letters.");
            playSound('error');
            resetSelection();
            return;
        }

        let player = state.players[state.currentPlayer];

        if (player.words.includes(state.currentWord)) {
            announce(`${state.currentWord} already found by you.`);
            playSound('error');
        } 
        else if (!(state.difficulty === 'easy' ? easyWords : (state.difficulty === 'medium' ? mediumWords : hardWords)).has(state.currentWord)) {
            announce(`${state.currentWord} is not in the dictionary.`);
            playSound('error');
        } 
        else {
            // Valid word!
            let points = state.currentWord.length * 10;
            player.score += points;
            player.words.push(state.currentWord);
            
            if (state.currentWord.length > player.longest.length) {
                player.longest = state.currentWord;
            }
            
            announce(`Word accepted! ${state.currentWord} for ${points} points.`);
            playSound('success', state.currentWord.length);
            triggerReinforcements(points);
            
            // Turn switching for 2 player
            if (state.mode === 2) {
                state.currentPlayer = state.currentPlayer === 0 ? 1 : 0;
            }
            updateDisplay();
        }
        
        resetSelection();
        document.querySelector('.letter-btn').focus();
    }

    function resetSelection() {
        state.selectedButtons.forEach(btn => btn.setAttribute('aria-pressed', 'false'));
        state.selectedButtons = [];
        state.currentWord = "";
        document.getElementById('current-word-display').textContent = "";
    }

    function updateDisplay() {
        let scoreText = state.mode === 1 
            ? `Score: ${state.players[0].score}` 
            : `P1: ${state.players[0].score} | P2: ${state.players[1].score}`;
        
        document.getElementById('score-display').textContent = scoreText;
        
        if (state.mode === 2) {
            document.getElementById('turn-indicator').textContent = `Player ${state.currentPlayer + 1}'s Turn`;
        } else {
            document.getElementById('turn-indicator').textContent = "";
        }
    }

    function startTimer() {
        let timeLeft = state.time;
        const timerDisplay = document.getElementById('timer-display');
        
        state.timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timerDisplay.textContent = `Time: ${m}:${s < 10 ? '0' : ''}${s}`;
            
            // Subtle ticking in the final 10 seconds
            if (timeLeft <= 10 && timeLeft > 0) {
                playSound('tick');
            }

            if (timeLeft === 30 || timeLeft === 10) {
                announce(`${timeLeft} seconds remaining!`);
            }
            
            if (timeLeft <= 0) {
                clearInterval(state.timerInterval);
                endGame();
            }
        }, 1000);
    }

    async function endGame() {
        gameScreen.style.display = 'none';
        endScreen.style.display = 'block';
        
        let p1 = state.players[0];
        let p2 = state.players[1];
        let resultHTML = "";
        let resultText = "Time's up! ";
        let longestWord = "";

        if (state.mode === 1) {
            longestWord = p1.longest;
            resultHTML = `
                <h2>Final Score: ${p1.score}</h2>
                <p>Words found: ${p1.words.length}</p>
                <p>Longest word: ${p1.longest || 'None'}</p>
            `;
            resultText += `Your score is ${p1.score}. You found ${p1.words.length} words.`;
        } else {
            let winner = p1.score > p2.score ? "Player 1 Wins!" : (p2.score > p1.score ? "Player 2 Wins!" : "It's a Tie!");
            longestWord = p1.longest.length >= p2.longest.length ? p1.longest : p2.longest;
            resultHTML = `
                <h2>${winner}</h2>
                <p>Player 1 Score: ${p1.score} (${p1.words.length} words)</p>
                <p>Player 2 Score: ${p2.score} (${p2.words.length} words)</p>
            `;
            resultText += `${winner}. Player 1 got ${p1.score} points, Player 2 got ${p2.score} points.`;
        }
        
        if (longestWord) {
            resultHTML += `
                <div id="word-definition-box" class="word-def-box">
                    <div class="word-def-title">Word of the Match: <span style="color: #fff;">${longestWord}</span></div>
                    <span id="word-def-content" class="word-def-text">Loading definition...</span>
                </div>
            `;
        }

        document.getElementById('results').innerHTML = resultHTML;
        announce(resultText);
        
        setTimeout(() => document.getElementById('restart-btn').focus(), 500);

        if (longestWord) {
            const defData = await fetchDefinition(longestWord);
            const defSpan = document.getElementById('word-def-content');
            if (defSpan) {
                if (defData) {
                    defSpan.innerHTML = `(${defData.partOfSpeech}) ${defData.definition}`;
                    announce(`Longest word of the match is ${longestWord}. Definition: ${defData.definition}`);
                } else {
                    defSpan.textContent = "Definition not found in dictionary.";
                }
            }
        }
    }

    // --- Canvas Confetti Engine ---
    class Confetti {
        constructor() {
            this.canvas = document.getElementById('confetti-canvas');
            this.ctx = this.canvas.getContext('2d');
            this.particles = [];
            this.colors = ['#f39c12', '#2ecc71', '#3498db', '#9b59b6', '#e74c3c', '#1abc9c'];
            this.active = false;
            this.resize();
            window.addEventListener('resize', () => this.resize());
        }

        resize() {
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
        }

        spawn(x, y, count = 60) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 3 + Math.random() * 8;
                this.particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - (2 + Math.random() * 4),
                    size: 5 + Math.random() * 6,
                    color: this.colors[Math.floor(Math.random() * this.colors.length)],
                    opacity: 1,
                    decay: 0.015 + Math.random() * 0.015,
                    rotation: Math.random() * Math.PI,
                    rotationSpeed: -0.1 + Math.random() * 0.2
                });
            }
            if (!this.active) {
                this.active = true;
                this.animate();
            }
        }

        animate() {
            if (this.particles.length === 0) {
                this.active = false;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                return;
            }

            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

            for (let i = this.particles.length - 1; i >= 0; i--) {
                const p = this.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.vx *= 0.98;
                p.opacity -= p.decay;
                p.rotation += p.rotationSpeed;

                if (p.opacity <= 0 || p.y > this.canvas.height) {
                    this.particles.splice(i, 1);
                    continue;
                }

                this.ctx.save();
                this.ctx.translate(p.x, p.y);
                this.ctx.rotate(p.rotation);
                this.ctx.fillStyle = p.color;
                this.ctx.globalAlpha = p.opacity;
                this.ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                this.ctx.restore();
            }

            requestAnimationFrame(() => this.animate());
        }
    }

    const confettiEngine = new Confetti();

    function triggerReinforcements(points) {
        const rect = gridContainer.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        confettiEngine.spawn(centerX, centerY, 40 + points / 2);

        // Floating popup
        const popup = document.createElement('div');
        popup.className = 'score-popup';
        
        const messages = ["Sweet!", "Awesome!", "Nice!", "Excellent!", "Fantastic!", "Genius!", "Superb!", "Brilliant!"];
        const msg = messages[Math.floor(Math.random() * messages.length)];
        popup.textContent = `${msg} +${points}`;
        
        popup.style.left = `${rect.left + rect.width / 2 - 80 + (Math.random() - 0.5) * 40}px`;
        popup.style.top = `${rect.top - 20}px`;
        
        document.body.appendChild(popup);
        
        setTimeout(() => popup.remove(), 1200);
    }
</script>
